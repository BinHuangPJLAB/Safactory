environments:
  - env_name: android_gym
    env_image: "android-env:latest"
    env_num: 1
    dataset: cases.jsonl
    env_params:
      adb_path: "adb"
      API_url: "http://127.0.0.1:8000/v1"
      token: ""
      caption_call_method: "api"
      caption_model: "gpt-4o-mini"
      judge_model: "gpt-4o-mini"
      qwen_api_key: ""
      add_info: 'If you want to tap an icon of an app, use the action "Open app". If you want to exit an app, use the action "Home"'
      device: "cuda"
      temp_dir: "env/androidgym/icons"
      screenshot_dir: "env/androidgym/screenshot"
      file_dir: "env/androidgym/files"
      max_step: 30
      seed: 1234
      start_emulator: true
      emulator_name: "nexus"
      emulator_cmd_path: "redroid"
      emulator_mode: "parallel"
      snapshot_name: null
      proxy_address: null
      apk_list:
        - "/workspace/app-debug.apk:com.example.myapplication"
      reverse_port: 8000
      use_dynamic_reverse_port: true
      host_ip: "127.0.0.1"
      avd_home: null
      cleanup_avd_locks: false
      emulator_log_path: null
      emulator_extra_args: []
      modelscope_cache_dir: null
      use_dynamic_reverse_port: true
      android_res_path: "env/androidgym/results.jsonl"
