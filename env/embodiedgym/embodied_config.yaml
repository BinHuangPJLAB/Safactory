# ============================================================================
# 方式 1: dataset 模式（每个任务一个环境实例 - 支持延迟初始化）
# ============================================================================
# 注意：使用延迟初始化，AI2THOR 只在 reset() 时启动，避免同时创建多个实例
# 框架会根据 max_workers 参数控制并发数，建议设置为 1-2
environments:
  - env_name: embodied_alfred
    env_image: embodiedbench/alfred:latest
    env_num: 1
    dataset: /mnt/shared-storage-user/evobox-share/gaozhenkun/gzk/AIEvoBox/env/embodiedgym/alfred_cases.jsonl
    env_params:
      resolution: 500
      detection_box: false
      max_episode_steps: 50
      max_invalid_actions: 10
      exp_name: "aievobox_alfred"

