  #     env_config: "env/mc/config/mine/mine_stone.yaml"

  # # Smelt tasks
  # - env_name: mc_gym
  #   env_num: 1
  #   env_params:
  #     env_config: "env/mc/config/smelt/iron_ingot.yaml"

# Notes:
# - env_name: Must match the registered environment name "mc_gym"
# - env_num: Number of parallel environment instances to create
# - env_config: Path to the specific task configuration YAML file
#   (relative to the AIEvoBox root directory)
#
# Task configurations support:
# - task_conf: Task instructions and objectives
# - reward_conf: Reward shaping for specific events
# - init_inventory: Starting items and equipment
# - command: Minecraft commands to run on reset
# - teleport: Initial spawn coordinates
# - mobs: Mobs to spawn
# - need_gui: Whether to open GUI (crafting/furnace)

