# Minecraft Environment Configuration
# This file defines multiple Minecraft task configurations
# Each configuration points to a specific task YAML in the config/ directory

environments:
  # Kill tasks
  - env_name: mc_gym
    env_num: 1
    env_params:
      env_config: "env/mc/config/kill/kill_zombie.yaml"

  # - env_name: mc_gym
  #   env_num: 1
  #   env_params:
