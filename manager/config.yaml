mode: docker

database:
  driver: "sqlite"
  sqlite_path: "env_trajs.db"

pool_size: 2

cluster:
  docker:
    bin: "docker"
    name_prefix: "safactory-openclaw"
    pull_policy: "never"              # never | always
    startup_concurrency: 8
    remove_on_close: true
    idle_command: "tail -f /dev/null"

    # Container reuse is opt-in by default. A reusable container is kept only
    # after the run succeeds, cleanup succeeds, and healthcheck succeeds.
    reuse_policy: "explicit"          # explicit | always | never
    default_reuse_container: false
    max_runs_per_container: 0         # 0 means unlimited when reuse is enabled

    # Safactory copies clusters/openclaw_safactory_runner.mjs into each
    # container. The runner reads one SimulationStartRequest JSON document from
    # stdin, configures OpenClaw to use the Safactory gateway session URL, runs
    # a real `openclaw agent --local` turn, and writes one
    # SimulationStartResult-compatible JSON document to stdout.
    runner_container_path: "/tmp/safactory-openclaw-runner.mjs"
    install_runner_script: true
    run_command: "node /tmp/safactory-openclaw-runner.mjs"
    cleanup_command: ""
    healthcheck_command: ""

  env_types:
    openclaw:
      docker:
        reuse_container: false
        run_command: "node /tmp/safactory-openclaw-runner.mjs"
        cleanup_command: ""
        healthcheck_command: ""
        volumes: []
        env: {}
        extra_args: []
